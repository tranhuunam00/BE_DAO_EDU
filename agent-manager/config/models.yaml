models:
  fast:
    provider: openai
    model: ${OPENAI_FAST_MODEL:-gpt-4.1-mini}
    temperature: 0
    max_tokens: 1400
  balanced:
    provider: openai
    model: ${OPENAI_BALANCED_MODEL:-gpt-4.1}
    temperature: 0
    max_tokens: 2600
  reliable:
    provider: anthropic
    model: ${ANTHROPIC_FALLBACK_MODEL:-claude-sonnet-4-5}
    temperature: 0
    max_tokens: 2600

task_routes:
  architecture: [balanced, reliable]
  backend: [balanced, reliable]
  frontend: [fast, balanced, reliable]
  review: [balanced, reliable]
  testing: [fast, balanced]
  synthesis: [fast, balanced]
  default: [fast, balanced, reliable]

retry:
  attempts_per_model: 2
  initial_delay_seconds: 0.5
  backoff_multiplier: 2.0

